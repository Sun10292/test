<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>笔记</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Segoe UI", "PingFang SC", sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
        }
        h1 { font-size: 18px; color: #333; margin-bottom: 24px; font-weight: 500; }
        .input-group { display: flex; gap: 8px; margin-bottom: 16px; }
        input {
            flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 16px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #666; }
        button {
            padding: 10px 20px; background: #333; color: #fff; border: none;
            border-radius: 8px; font-size: 14px; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #555; }
        .error { color: #e74c3c; font-size: 13px; min-height: 20px; margin-top: 4px; }
        .content {
            display: none; margin-top: 24px; padding: 24px; background: #fafafa;
            border-radius: 8px; border-left: 4px solid #e74c3c; text-align: left;
            font-size: 15px; line-height: 1.8; color: #222; word-break: break-word; white-space: pre-wrap;
        }
        .content.destroyed { display: block; border-left-color: #ccc; color: #999; font-style: italic; }
        .hint { color: #999; font-size: 12px; margin-top: 12px; min-height: 18px; }
        .footer { margin-top: 20px; font-size: 11px; color: #ddd; }
        @media (max-width: 480px) { .container { padding: 24px; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🔒 私密笔记</h1>
    <div id="inputArea">
        <div style="margin-bottom:12px; padding:10px 14px; background:#fff3cd; border:1px solid #ffeeba; border-radius:8px; color:#856404; font-size:14px; font-weight:600;">
            💡 密码提示：名字小写拼音
        </div>
        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="输入密码" maxlength="32">
            <button id="unlockBtn">查看</button>
        </div>
        <div class="error" id="errorMsg"></div>
    </div>
    <div class="content" id="secretContent"></div>
    <div class="hint" id="hint"></div>
    <div class="footer">·</div>
</div>

<script>
    const PASSWORD = "sunyi";
    const SECRET_TEXT = `想你😭，难受，什么时候才能恢复正常，我大约6月26就放假了，之后去上海，大概7.12回六安，我好想你...`;
    const KEY = "burn_after_reading_v1";

    if (sessionStorage.getItem(KEY) === "destroyed") { showDestroyed(); }

    function showDestroyed() {
        document.getElementById("inputArea").style.display = "none";
        const el = document.getElementById("secretContent");
        el.textContent = "此内容已被查看，已自动销毁。";
        el.className = "content destroyed";
        el.style.display = "block";
        document.getElementById("hint").textContent = "内容已被销毁，无法再次查看。";
    }

    function revealContent() {
        const el = document.getElementById("secretContent");
        el.textContent = SECRET_TEXT;
        el.style.display = "block";
        el.className = "content";
        document.getElementById("inputArea").style.display = "none";
        document.getElementById("hint").textContent = "✅ 内容已显示，关闭此页后自动销毁。";
        sessionStorage.setItem(KEY, "destroyed");
    }

    function handleUnlock() {
        const input = document.getElementById("passwordInput");
        const error = document.getElementById("errorMsg");
        if (input.value === PASSWORD) {
            error.textContent = ""; revealContent();
        } else {
            error.textContent = "❌ 密码错误，请重试"; input.value = ""; input.focus();
        }
    }

    document.getElementById("passwordInput").addEventListener("keydown", e => { if (e.key === "Enter") handleUnlock(); });
    document.getElementById("unlockBtn").addEventListener("click", handleUnlock);
    window.addEventListener("beforeunload", () => sessionStorage.setItem(KEY, "destroyed"));
</script>
</body>
</html>
